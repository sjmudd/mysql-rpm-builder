        srpm: https://dev.mysql.com/get/Downloads/MySQL-9.0/mysql-community-9.7.1-1.el10.src.rpm
        auto_install_dependencies: true
        # Packages yum-builddep does not install from the src.rpm header:
        #   wget             - needed by the install-srpm step itself
        #   rpm-build        - provides rpmbuild; not a BuildRequires
        #   libquadmath-devel- BuildRequires gated behind the el10 macro, which
        #                      yum-builddep ignores for a .src.rpm target
        #                      (see docs/yum-builddep-define-srpm-bug.md)
        #  Note: Future code changes will remove wget, rpm-build from this list as they are always needed as part of the mysql-rpm-builder workflow
        extra_packages: [wget, rpm-build, libquadmath-devel]
