# Build definitions for the MySQL rpm builder, configured by OS / MySQL version.
#
# Each entry is fully explicit for each OS / MySQL version combination.
# Ideally when a new version of MySQL is released you can use the settings
# from the previously built version. Sometimes this needs tweaking.
#
# Per-build fields:
#   srpm                        (required) URL of the source RPM to build.
#   auto_install_dependencies   (required) true/false. When true, yum-builddep
#                               resolves the src.rpm's BuildRequires (yum-utils
#                               is installed first as it provides yum-builddep).
#   extra_packages              (optional) packages missing from the src.rpm's
#                               BuildRequires; installed first, before builddep.
#   packages                    (optional) explicit packages, installed last.
#
# Build deps are installed in the order: extra_packages, then yum-builddep (if
# auto_install_dependencies), then packages. At least one of
# auto_install_dependencies or packages must be set.
