# Build definitions for the MySQL rpm builder, configured by OS / MySQL version.
#
# Each entry is fully explicit for each OS / MySQL version combination.
# Ideally when a new version of MySQL is released you can use the settings
# from the previously built version. Sometimes this needs tweaking.
#
# The base tooling every build needs (wget, rpm-build) is installed
# unconditionally by the program, so it never needs listing here.
#
# Per-build fields:
#   srpm                        (required) URL of the source RPM to build.
#   auto_install_dependencies   (required) true/false. When true, the
#                               install-builddeps step runs yum-builddep against
#                               the extracted mysql.spec to resolve its
#                               BuildRequires (yum-utils is installed first as it
#                               provides yum-builddep).
#   packages                    (optional) explicit packages installed as root
#                               before the build. Not needed when
#                               auto_install_dependencies resolves everything if
#                               BuildRequires: is configured correctly.
#
# At least one of auto_install_dependencies or packages must be set.
oses:
  #
  # Alma Linux
  #
  almalinux9:
    builds:
      9.7.1:
        # auto_install_dependencies: true is insufficient
        # - see https://bugs.mysql.com/bug.php?id=120895
        srpm: https://dev.mysql.com/get/Downloads/MySQL-9.0/mysql-community-9.7.1-1.el9.src.rpm
        packages: [libfido2-devel, libudev-devel]
        auto_install_dependencies: true

  almalinux10:
    builds:

  #
  # CentOS
  #

  #
  # Oracle Linux
  #
  ol9:
    builds:
      # auto_install_dependencies: true is insufficient
      # - see https://bugs.mysql.com/bug.php?id=120895
      9.7.1:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-9.0/mysql-community-9.7.1-1.el9.src.rpm
        packages: [libfido2-devel, libudev-devel]
        auto_install_dependencies: true

  ol10:
    builds:
      8.4.7:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-8.4/mysql-community-8.4.7-1.el10.src.rpm
        auto_install_dependencies: true
      8.4.8:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-8.4/mysql-community-8.4.8-1.el10.src.rpm
        auto_install_dependencies: true
      8.4.9:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-8.4/mysql-community-8.4.9-1.el10.src.rpm
        auto_install_dependencies: true
      8.4.10:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-8.4/mysql-community-8.4.10-1.el10.src.rpm
        auto_install_dependencies: true

      9.7.1:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-9.0/mysql-community-9.7.1-1.el10.src.rpm
        auto_install_dependencies: true
  #
  # Rocky Linux
  #
  rocky9:
    builds:
      # auto_install_dependencies: true is insufficient
      # - see https://bugs.mysql.com/bug.php?id=120895
      9.7.1:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-9.0/mysql-community-9.7.1-1.el9.src.rpm
        packages: [libfido2-devel, libudev-devel]
        auto_install_dependencies: true

  rocky10:
    builds:
      8.4.7:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-8.4/mysql-community-8.4.7-1.el10.src.rpm
        auto_install_dependencies: true
      8.4.10:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-8.4/mysql-community-8.4.10-1.el10.src.rpm
        auto_install_dependencies: true
      9.7.1:
        srpm: https://dev.mysql.com/get/Downloads/MySQL-9.0/mysql-community-9.7.1-1.el10.src.rpm
        auto_install_dependencies: true
